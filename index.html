<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Частотный криптоанализ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Расшифровать методом частотного криптоанализа</h1>
        
        <div class="input-group">
            <label for="text-input" class="input-label">Введите текст для расшифровки:</label>
            <textarea 
                id="text-input" 
                class="text-input" 
                placeholder="Введите зашифрованный текст здесь..."
                rows="6"
            ></textarea>
        </div>
        
        <button class="decrypt-btn">Расшифровать</button>
        
        <div class="result-group" style="display: none;">
            <label class="input-label">Результат расшифровки:</label>
            <div class="result-output" id="result-output"></div>
        </div>
    </div>
</body>
</html>
